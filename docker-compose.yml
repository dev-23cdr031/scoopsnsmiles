services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-sakthi_bakers}
      MYSQL_USER: ${MYSQL_USER:-sakthi}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-sakthi_pass}
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/scripts/seed.sql:/docker-entrypoint-initdb.d/01-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 20
    ports:
      - "3306:3306"

  ml-backend:
    image: python:3.11-slim
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./ml-backend:/app
    command: >
      sh -c "python -m pip install --no-cache-dir -r requirements.txt &&
      python train_models.py &&
      uvicorn main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER:-sakthi}
      DB_PASSWORD: ${MYSQL_PASSWORD:-sakthi_pass}
      DB_NAME: ${MYSQL_DATABASE:-sakthi_bakers}
      DATABASE_URL: ${DATABASE_URL:-}
      DB_SSL: ${DB_SSL:-false}
      ML_API_BASE_URL: ${ML_API_BASE_URL:-http://ml-backend:8000}
      PORT: 5000
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
    depends_on:
      ml-backend:
        condition: service_started
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:5000}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:5000}
      PORT: 3000
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  db_data:
